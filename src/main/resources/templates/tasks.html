<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">

<head>
    <meta charset="UTF-8">
    <title>TaskList</title>
</head>

<body>
    <h1>TaskList</h1>

    <h2>新しいタスクを追加</h2>

    <!--
        タスク追加フォームです。
        th:object="${taskForm}" は、Controllerから渡されたTaskFormと対応します。
    -->
    <form th:action="@{/tasks}" th:object="${taskForm}" method="post">
        <div>
            <label for="title">タイトル</label>

            <!--
                th:field="*{title}" は taskForm.title と対応します。
                入力された文字列は、ControllerのTaskFormに入ります。
            -->
            <input type="text" id="title" th:field="*{title}">
        </div>

        <!--
            titleに入力エラーがある場合だけ、エラーメッセージを表示します。
        -->
        <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>

        <div>
            <label for="dueDate">期限</label>

            <!--
                type="date" にすると、ブラウザの日付入力欄になります。
                th:field="*{dueDate}" は taskForm.dueDate と対応します。
                未入力の場合、Java側では null として扱われます。
            -->
            <input type="date" id="dueDate" th:field="*{dueDate}">
        </div>

        <div>
            <label for="priority">優先度</label>
        
            <!--
                th:field="*{priority}" は taskForm.priority と対応します。
                priorities は Controller の @ModelAttribute から渡されています。
            -->
            <select id="priority" th:field="*{priority}">
                <option th:each="priority : ${priorities}"
                        th:value="${priority}"
                        th:text="${priority.displayName}">
                </option>
            </select>
        </div>

        <button type="submit">追加</button>
    </form>
    
    <h2>表示条件</h2>

    <!--
        タスク一覧の表示条件、並び替え条件、検索キーワードを指定するフォームです。
        method="get" にすることで、選択した条件がURLのクエリパラメータとして送信されます。
        例: /?filter=ACTIVE&sort=DUE_DATE&keyword=Spring
    -->
    <form th:action="@{/}" method="get">
        <div>
            <label for="filter">表示</label>

            <!--
                name="filter" は Controller の @RequestParam(name = "filter") と対応します。
                selectedFilter は、現在選択中の表示条件です。
            -->
            <select id="filter" name="filter">
                <option th:each="filterType : ${filterTypes}"
                        th:value="${filterType}"
                        th:text="${filterType.displayName}"
                        th:selected="${filterType == selectedFilter}">
                </option>
            </select>
        </div>

        <div>
            <label for="sort">並び替え</label>

            <!--
                name="sort" は Controller の @RequestParam(name = "sort") と対応します。
                selectedSort は、現在選択中の並び替え条件です。
            -->
            <select id="sort" name="sort">
                <option th:each="sortType : ${sortTypes}"
                        th:value="${sortType}"
                        th:text="${sortType.displayName}"
                        th:selected="${sortType == selectedSort}">
                </option>
            </select>
        </div>

        <div>
            <label for="keyword">検索</label>

            <!--
                name="keyword" は Controller の @RequestParam(name = "keyword") と対応します。
                valueには現在の検索キーワードを入れて、検索後も入力欄に文字が残るようにします。
            -->
            <input type="text"
                   id="keyword"
                   name="keyword"
                   th:value="${keyword}"
                   placeholder="タイトルで検索">
        </div>

        <button type="submit">変更</button>

        <!--
            検索条件をリセットするためのリンクです。
            クリックすると、filter / sort / keyword なしの一覧画面へ戻ります。
        -->
        <a th:href="@{/}">リセット</a>
    </form>

    <h2>タスク一覧</h2>

    <ul>
        <!--
            Controllerから渡された tasks を1件ずつ取り出します。
            tasks は List<Task> のような一覧データです。
        -->
        <li th:each="task : ${tasks}">
            <!--
                task.done は Taskクラスの isDone() に対応します。
                true の場合は「完了」、false の場合は「未完了」と表示します。
            -->
            <span th:text="${task.done ? '完了' : '未完了'}"></span>

            <!--
                task.title は Taskクラスの getTitle() に対応します。
                完了済みタスクは、見た目でわかるように取り消し線を付けます。
            -->
            <span th:text="${task.title}"
                  th:style="${task.done ? 'text-decoration: line-through;' : ''}">
            </span>

            <!--
                期限日を表示します。
                dueDate が null の場合は「期限なし」と表示します。
            -->
            <span th:text="${task.dueDate != null ? '期限: ' + task.dueDate : '期限なし'}"></span>

            <!--
                優先度を表示します。
                task.priority は Taskクラスの getPriority() に対応します。
            -->
            <span th:text="${'優先度: ' + task.priority.displayName}"></span>

            <!--
                編集画面へ移動するリンクです。
                task.id をURLに埋め込んで、Controllerの /tasks/{id}/edit にアクセスします。
            -->
            <a th:href="@{/tasks/{id}/edit(id=${task.id})}">編集</a>

            <!--
                完了状態を切り替えるフォームです。
                task.id をURLに埋め込んで、Controllerの /tasks/{id}/toggle に送信します。
            -->
            <form th:action="@{/tasks/{id}/toggle(id=${task.id})}" method="post" style="display:inline;">
                <button type="submit" th:text="${task.done ? '未完了に戻す' : '完了にする'}"></button>
            </form>

            <!--
                削除フォームです。
                task.id をURLに埋め込んで、Controllerの /tasks/{id}/delete に送信します。
            -->
            <form th:action="@{/tasks/{id}/delete(id=${task.id})}" method="post" style="display:inline;">
                <button type="submit">削除</button>
            </form>
        </li>
    </ul>
</body>

</html>
